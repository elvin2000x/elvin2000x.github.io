/* ===================== ENGINE ===================== */
function startQuizEngine() {
  var stageEl = document.getElementById("stage");
  var barEl = document.getElementById("bar");
  var answers = [];
  var cur = 0;
  var N = QUIZ.questions.length;
  var lead = { email:"", name:"" };

  // Ad conversion ids for THIS quiz (lead capture). Create a Google Ads
  // "Submit lead form" conversion and an X "Lead" event for the Time-Waste
  // quiz, then paste them here. Both dormant until then.
  var ADS = { x: "", g: "" }; // PENDING id  (x = X "Lead" event id, g = "AW-637214471/<label>")

  function setBar(p){ barEl.style.width = p + "%"; }
  function track(name, params){ try{ gtag('event', name, params||{}); }catch(e){} }
  function render(html){ stageEl.innerHTML = html; stageEl.firstElementChild && stageEl.firstElementChild.classList.add('fade'); }
  function fmt(n){ return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

  function showIntro(){
    cur = 0; setBar(0);
    var i = QUIZ.intro;
    render(
      '<div class="card intro">' +
        '<div class="eyebrow">'+i.eyebrow+'</div>' +
        '<h1>'+i.title+'</h1>' +
        i.body.map(function(p){return '<p>'+p+'</p>';}).join('') +
        '<div class="meta">'+i.meta+'</div>' +
        '<button class="btn full" id="startBtn">'+i.cta+'</button>' +
      '</div>'
    );
    document.getElementById("startBtn").onclick = function(){ track('quiz_start'); cur=0; showQuestion(); };
  }

  function showQuestion(){
    var Q = QUIZ.questions[cur];
    setBar(Math.round((cur)/(N+1)*100));
    var picked = answers[cur] ? answers[cur].optIndex : -1;
    var opts = Q.opts.map(function(o, idx){
      return '<button class="opt'+(idx===picked?' sel':'')+'" data-i="'+idx+'">' +
               '<span class="dot"></span><span>'+o.t+'</span>' +
             '</button>';
    }).join('');
    render(
      '<div class="card">' +
        '<div class="qnum">Question '+(cur+1)+' of '+N+'</div>' +
        '<div class="qtext">'+Q.q+'</div>' +
        '<div class="options">'+opts+'</div>' +
        '<div class="nav-row">' +
          '<button class="back" id="backBtn"'+(cur===0?' disabled':'')+'>← Back</button>' +
          '<button class="btn" id="nextBtn"'+(picked<0?' disabled':'')+'>'+(cur===N-1?'See my number →':'Next →')+'</button>' +
        '</div>' +
      '</div>'
    );
    Array.prototype.forEach.call(document.querySelectorAll(".opt"), function(b){
      b.onclick = function(){
        var idx = +b.getAttribute("data-i");
        answers[cur] = { optIndex: idx, text: Q.opts[idx].t };
        Array.prototype.forEach.call(document.querySelectorAll(".opt"), function(x){x.classList.remove("sel");});
        b.classList.add("sel");
        document.getElementById("nextBtn").disabled = false;
      };
    });
    document.getElementById("backBtn").onclick = function(){ if(cur>0){ cur--; showQuestion(); } };
    document.getElementById("nextBtn").onclick = function(){
      if(!answers[cur]) return;
      if(cur < N-1){ cur++; showQuestion(); } else { showGate(); }
    };
  }

  function showGate(){
    setBar(Math.round(N/(N+1)*100));
    render(
      '<div class="card gate">' +
        '<div class="eyebrow">Almost there</div>' +
        '<h1 style="font-size:30px;margin-bottom:10px;">Where should we send your number?</h1>' +
        '<p style="color:var(--muted);margin-bottom:22px;">Your reclaimable hours and dollars, the workflows to automate first, plus one short email a week on automating your busywork. No spam, unsubscribe any time.</p>' +
        '<div class="err" id="gateErr">Please enter a valid email.</div>' +
        '<label for="qname">First name (optional)</label>' +
        '<input id="qname" type="text" autocomplete="given-name" placeholder="Alex" />' +
        '<label for="qemail">Email</label>' +
        '<input id="qemail" type="email" autocomplete="email" placeholder="you@work.com" />' +
        '<button class="btn full" id="seeBtn">Show me my number →</button>' +
        '<div class="fineprint">We only use this to send your result and the newsletter.</div>' +
        '<div class="nav-row"><button class="back" id="backBtn2">← Back</button><span></span></div>' +
      '</div>'
    );
    document.getElementById("backBtn2").onclick = function(){ cur = N-1; showQuestion(); };
    document.getElementById("seeBtn").onclick = function(){
      var email = document.getElementById("qemail").value.trim();
      var name = document.getElementById("qname").value.trim();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ document.getElementById("gateErr").style.display="block"; return; }
      lead.email = email; lead.name = name;
      track('quiz_lead', {});
      try{ fbq('track','Lead',{content_name:QUIZ.leadName+' Quiz'}); }catch(e){}
      submitLead();
      showResult();
    };
  }

  function scoreTime(){
    var rate = 50, tasks = [];
    var weeklyHours = 0;
    answers.forEach(function(a, qi){
      var Q = QUIZ.questions[qi];
      var o = Q.opts[a.optIndex];
      if(Q.type === "rate"){ rate = o.rate; return; }
      var reclaim = o.h * Q.auto; // hours/week AI can realistically take
      weeklyHours += reclaim;
      tasks.push({ task: Q.task, hours: reclaim, tip: Q.tip });
    });
    var yearlyHours = weeklyHours * QUIZ.workWeeks;
    var yearlyDollars = yearlyHours * rate;
    tasks.sort(function(x,y){ return y.hours - x.hours; });
    var band = QUIZ.bands[QUIZ.bands.length-1];
    for(var i=0;i<QUIZ.bands.length;i++){ if(weeklyHours <= QUIZ.bands[i].max){ band = QUIZ.bands[i]; break; } }
    return { rate:rate, weeklyHours:weeklyHours, yearlyHours:yearlyHours, yearlyDollars:yearlyDollars, tasks:tasks, band:band };
  }

  function submitLead(){
    var res = scoreTime();
    var summary = answers.map(function(a, qi){ return (qi+1)+". "+QUIZ.questions[qi].q+" -> "+a.text; }).join("  |  ");
    var payload = {
      name: lead.name || "Quiz lead",
      email: lead.email,
      message: "[TIME WASTE: "+res.band.name+" · "+res.weeklyHours.toFixed(1)+"h/wk · "+Math.round(res.yearlyHours)+"h/yr · $"+Math.round(res.yearlyDollars)+"/yr]  "+summary,
      source: QUIZ.source + (location.search || "")
    };
    try {
      var body = new URLSearchParams(payload).toString();
      fetch(QUIZ.leadApi, {
        method: "POST", mode: "cors", keepalive: true,
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body
      }).catch(function(){});
    } catch(e){}
    // Ad conversions: quiz lead captured. Fire-and-forget, never blocks the funnel.
    try{ if(ADS.x && typeof twq==='function') twq('event', ADS.x, {}); }catch(e){}      // PENDING id
    try{ if(ADS.g && typeof gtag==='function') gtag('event','conversion',{send_to:ADS.g}); }catch(e){}  // PENDING id
  }

  function showResult(){
    setBar(100);
    var res = scoreTime();
    var B = res.band;
    track('quiz_result', { band: B.name, weekly_hours: Math.round(res.weeklyHours), yearly_dollars: Math.round(res.yearlyDollars) });

    var top = res.tasks.filter(function(t){ return t.hours > 0.2; }).slice(0,3);
    var topHtml = top.length ? '<div class="tools">' + top.map(function(t){
      return '<div class="tool"><span class="dot" style="margin-top:3px;"></span><div><div class="tn">'+t.task+'</div><div class="td">'+t.tip+'</div></div><span class="th">~'+t.hours.toFixed(1)+' h/wk</span></div>';
    }).join('') + '</div>'
      : '<p>You\'re running remarkably lean already. The workflows above are still worth automating so the small stuff never creeps back onto your plate.</p>';

    var magnets = QUIZ.magnets.map(function(m){
      return '<a class="magnet" href="'+m.url+'" target="_blank" rel="noopener" data-mn="'+m.n+'">' +
               '<div class="mg">Free guide</div><div class="mn">'+m.n+'</div><div class="md">'+m.d+'</div>' +
             '</a>';
    }).join('');

    render(
      '<div class="card result">' +
        '<div class="type-eyebrow">Your time-waste number</div>' +
        '<h1>'+B.name+'</h1>' +
        '<div class="tagline">'+B.tagline+'</div>' +
        '<div class="bignums">' +
          '<div class="bignum"><div class="n">'+res.weeklyHours.toFixed(1)+'</div><div class="l">hours / week</div></div>' +
          '<div class="bignum"><div class="n">'+fmt(res.yearlyHours)+'</div><div class="l">hours / year</div></div>' +
          '<div class="bignum"><div class="n">$'+fmt(res.yearlyDollars)+'</div><div class="l">value / year</div></div>' +
        '</div>' +
        '<div class="disclaimer">A conservative estimate based on your answers, at $'+res.rate+'/hour over '+QUIZ.workWeeks+' working weeks. It counts only the share of each task AI can realistically take off your plate today.</div>' +
        '<div class="block" style="margin-top:26px;"><h3>What this means</h3><p>'+B.summary+'</p></div>' +
        '<div class="block"><h3>Automate these first</h3>'+topHtml+'</div>' +
        '<div class="block"><h3>Start reclaiming it, free</h3>'+magnets+'</div>' +
        '<div class="book-cta">' +
          '<div class="why">'+QUIZ.angle+'</div>' +
          '<a class="btn" href="'+QUIZ.bookUrl+'" target="_blank" rel="noopener" id="bookBtn">Get The Artificial Advantage — $37 →</a>' +
          '<div class="price">PDF · instant delivery · 14-day money-back guarantee · also on Amazon</div>' +
        '</div>' +
        '<div class="share"><a href="'+QUIZ.salesUrl+'" target="_blank" rel="noopener">Read more about the book →</a></div>' +
      '</div>'
    );
    Array.prototype.forEach.call(document.querySelectorAll(".magnet"), function(a){
      a.onclick = function(){ track('magnet_click', {event_label:a.getAttribute('data-mn')}); };
    });
    var bb = document.getElementById("bookBtn");
    if(bb) bb.onclick = function(){ track('gumroad_click', {event_label:'quiz_result'}); try{ fbq('track','InitiateCheckout',{content_name:'The Artificial Advantage',value:37.00,currency:'USD'});}catch(e){} };
  }

  showIntro();
}

document.addEventListener("DOMContentLoaded", startQuizEngine);
</script>
</body>
</html>
