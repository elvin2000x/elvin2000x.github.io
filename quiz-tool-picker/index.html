  function showQuestion(){
    var Q = QUIZ.questions[cur];
    setBar(Math.round((cur)/(N+1)*100));
    var picked = answers[cur] ? answers[cur].optIndex : -1;
    var opts = Q.opts.map(function(o, idx){
      return '<button class="opt'+(idx===picked?' sel':'')+'" data-i="'+idx+'">' +
               '<span class="dot"></span><span>'+o.t+'</span>' +
             '</button>';
    }).join('');
    render(
      '<div class="card">' +
        '<div class="qnum">Question '+(cur+1)+' of '+N+'</div>' +
        '<div class="qtext">'+Q.q+'</div>' +
        '<div class="options">'+opts+'</div>' +
        '<div class="nav-row">' +
          '<button class="back" id="backBtn"'+(cur===0?' disabled':'')+'>← Back</button>' +
          '<button class="btn" id="nextBtn"'+(picked<0?' disabled':'')+'>'+(cur===N-1?'See my recommendation →':'Next →')+'</button>' +
        '</div>' +
      '</div>'
    );
    Array.prototype.forEach.call(document.querySelectorAll(".opt"), function(b){
      b.onclick = function(){
        var idx = +b.getAttribute("data-i");
        answers[cur] = { optIndex: idx, text: Q.opts[idx].t };
        Array.prototype.forEach.call(document.querySelectorAll(".opt"), function(x){x.classList.remove("sel");});
        b.classList.add("sel");
        document.getElementById("nextBtn").disabled = false;
      };
    });
    document.getElementById("backBtn").onclick = function(){ if(cur>0){ cur--; showQuestion(); } };
    document.getElementById("nextBtn").onclick = function(){
      if(!answers[cur]) return;
      if(cur < N-1){ cur++; showQuestion(); } else { showGate(); }
    };
  }

  function showGate(){
    setBar(Math.round(N/(N+1)*100));
    render(
      '<div class="card gate">' +
        '<div class="eyebrow">Almost there</div>' +
        '<h1 style="font-size:30px;margin-bottom:10px;">Where should we send your recommendation?</h1>' +
        '<p style="color:var(--muted);margin-bottom:22px;">Your recommended stack and the reasoning, plus one short email a week on getting more out of these tools. No spam, unsubscribe any time.</p>' +
        '<div class="err" id="gateErr">Please enter a valid email.</div>' +
        '<label for="qname">First name (optional)</label>' +
        '<input id="qname" type="text" autocomplete="given-name" placeholder="Alex" />' +
        '<label for="qemail">Email</label>' +
        '<input id="qemail" type="email" autocomplete="email" placeholder="you@work.com" />' +
        '<button class="btn full" id="seeBtn">Show me my AI stack →</button>' +
        '<div class="fineprint">We only use this to send your result and the newsletter.</div>' +
        '<div class="nav-row"><button class="back" id="backBtn2">← Back</button><span></span></div>' +
      '</div>'
    );
    document.getElementById("backBtn2").onclick = function(){ cur = N-1; showQuestion(); };
    document.getElementById("seeBtn").onclick = function(){
      var email = document.getElementById("qemail").value.trim();
      var name = document.getElementById("qname").value.trim();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ document.getElementById("gateErr").style.display="block"; return; }
      lead.email = email; lead.name = name;
      track('quiz_lead', {});
      try{ fbq('track','Lead',{content_name:QUIZ.leadName+' Quiz'}); }catch(e){}
      submitLead();
      showResult();
    };
  }

  function scoreTool(){
    var sc = { claude:0, chatgpt:0, gemini:0, copilot:0, perplexity:0 };
    answers.forEach(function(a, qi){
      var o = QUIZ.questions[qi].opts[a.optIndex];
      for(var k in o.w){ sc[k] += o.w[k]; }
    });
    // Tie-break order favors the more broadly useful tool when scores are equal.
    var order = ["chatgpt","claude","perplexity","gemini","copilot"];
    var best = order[0], bestv = -1;
    order.forEach(function(k){ if(sc[k] > bestv){ bestv = sc[k]; best = k; } });
    return { key: best, scores: sc };
  }

  function submitLead(){
    var res = scoreTool();
    var S = QUIZ.stacks[res.key];
    var summary = answers.map(function(a, qi){ return (qi+1)+". "+QUIZ.questions[qi].q+" -> "+a.text; }).join("  |  ");
    var payload = {
      name: lead.name || "Quiz lead",
      email: lead.email,
      message: "[TOOL PICK: "+S.lead+"]  "+summary,
      source: QUIZ.source + (location.search || "")
    };
    try {
      var body = new URLSearchParams(payload).toString();
      fetch(QUIZ.leadApi, {
        method: "POST", mode: "cors", keepalive: true,
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body
      }).catch(function(){});
    } catch(e){}
    // Ad conversions: quiz lead captured. Fire-and-forget, never blocks the funnel.
    try{ if(ADS.x && typeof twq==='function') twq('event', ADS.x, {}); }catch(e){}      // PENDING id
    try{ if(ADS.g && typeof gtag==='function') gtag('event','conversion',{send_to:ADS.g}); }catch(e){}  // PENDING id
  }

  function showResult(){
    setBar(100);
    var res = scoreTool();
    var S = QUIZ.stacks[res.key];
    track('quiz_result', { tool: S.lead });

    var stack = S.stack.map(function(t){
      return '<div class="tool"><span class="dot" style="margin-top:3px;"></span><div><div class="tn">'+t.n+'</div><div class="td">'+t.d+'</div></div></div>';
    }).join('');

    var magnets = QUIZ.magnets.map(function(m){
      return '<a class="magnet" href="'+m.url+'" target="_blank" rel="noopener" data-mn="'+m.n+'">' +
               '<div class="mg">Free</div><div class="mn">'+m.n+'</div><div class="md">'+m.d+'</div>' +
             '</a>';
    }).join('');

    render(
      '<div class="card result">' +
        '<div class="type-eyebrow">Your recommended AI tool</div>' +
        '<h1>Start with '+S.lead+'</h1>' +
        '<div class="tagline">'+S.tagline+'</div>' +
        '<div class="primary"><div class="plabel">Why this fits you</div><div class="pname">'+S.name+'</div><div class="pwhy">'+S.leadWhy+'</div></div>' +
        '<div class="block"><h3>Your honest stack</h3><div class="tools">'+stack+'</div></div>' +
        '<div class="block"><h3>Get more out of it, free</h3>'+magnets+'</div>' +
        '<div class="book-cta">' +
          '<div class="why">'+QUIZ.angle+'</div>' +
          '<a class="btn" href="'+QUIZ.bookUrl+'" target="_blank" rel="noopener" id="bookBtn">Get The Artificial Advantage — $37 →</a>' +
          '<div class="price">PDF · instant delivery · 14-day money-back guarantee · also on Amazon</div>' +
        '</div>' +
        '<div class="share"><a href="'+QUIZ.salesUrl+'" target="_blank" rel="noopener">Read more about the book →</a></div>' +
      '</div>'
    );
    Array.prototype.forEach.call(document.querySelectorAll(".magnet"), function(a){
      a.onclick = function(){ track('magnet_click', {event_label:a.getAttribute('data-mn')}); };
    });
    var bb = document.getElementById("bookBtn");
    if(bb) bb.onclick = function(){ track('gumroad_click', {event_label:'quiz_result'}); try{ fbq('track','InitiateCheckout',{content_name:'The Artificial Advantage',value:37.00,currency:'USD'});}catch(e){} };
  }

  showIntro();
}

document.addEventListener("DOMContentLoaded", startQuizEngine);
</script>
</body>
</html>
