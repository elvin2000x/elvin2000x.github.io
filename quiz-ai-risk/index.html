/* =========================================================================
   AI RISK SCORE — self-contained, config-driven.
   Each option carries a risk value r (0..3). Higher total = riskier.
   Options that describe a genuinely risky habit also carry a `fix` string,
   which surfaces on the result as the reader's specific exposure list.
   Result band is chosen by the normalized 0..100 score.
   ========================================================================= */
var QUIZ = {
  source: "ai-risk-quiz",
  leadName: "AI Risk Score",
  bookUrl: "https://www.amazon.com/dp/B0H4X2S2JD",
  salesUrl: "https://elvinpeters.com/",
  leadApi: "https://ultimateaidirectory.com/api/lead", // owned lead DB (HTTPS, CORS-enabled)

  intro: {
    eyebrow: "60-Second Risk Assessment",
    title: "What's your AI risk score?",
    body: [
      "Most of the real danger with AI at work is quiet. It's the customer data pasted into a public chatbot, the confident answer nobody checked, the tool your company never approved.",
      "Answer 8 quick questions and you'll get your personal risk score, see exactly where you're exposed right now, and get the specific fixes that close each gap."
    ],
    meta: "8 questions · about 60 seconds · free personalized result",
    cta: "Get my risk score →"
  },

  questions: [
    {
      q: "When you use AI at work, what kind of information ends up in the prompt?",
      opts: [
        { t: "Only general questions, never anything internal", r:0 },
        { t: "Rough work notes, nothing sensitive", r:1 },
        { t: "Internal docs or numbers, lightly cleaned up first", r:2 },
        { t: "Whatever I'm working on, including customer or company data", r:3,
          fix:"You're pasting customer or company data into AI tools. Anything you send to a public tool can be retained and, on some plans, used for training. Strip identifiers first and move sensitive work to a tool with a business plan and a no-training agreement." }
      ]
    },
    {
      q: "Before you use an AI answer in real work, how often do you verify it?",
      opts: [
        { t: "Always, I check every claim and source", r:0 },
        { t: "For anything important, yes", r:1 },
        { t: "Sometimes, if it looks off", r:2,
          fix:"You verify only when something looks wrong, but confident-sounding errors are the ones that slip through. Build a quick habit of asking the tool for its sources and spot-checking any fact, name, or number before it leaves your desk." },
        { t: "Rarely, I mostly trust what it gives me", r:3,
          fix:"You're using AI output without checking it. These tools invent facts, citations, and figures that read as completely real. Treat every factual claim as a draft until you confirm it against a trusted source." }
      ]
    },
    {
      q: "Are the AI tools you use actually approved by your company?",
      opts: [
        { t: "Yes, we have an approved list and I stick to it", r:0 },
        { t: "Mostly, with the occasional exception", r:1 },
        { t: "I use whatever works, approval never came up", r:2,
          fix:"You're using tools your company hasn't vetted. Even good tools can route data through servers your employer never agreed to. Ask what's on the approved list, and if there isn't one, that's a conversation worth starting." },
        { t: "We're told not to, and I use them anyway", r:3,
          fix:"You're using AI tools your company has told people not to. That's the fastest route to a data or disciplinary problem. Push for a sanctioned option instead of working around the ban, because the workaround is where the exposure lives." }
      ]
    },
    {
      q: "Have you connected AI tools to your accounts, files, or logins?",
      opts: [
        { t: "No, I keep them separate", r:0 },
        { t: "One or two, and I checked the permissions", r:1 },
        { t: "A few, I clicked through the permissions quickly", r:2,
          fix:"You've granted account access without reading what you approved. Browser extensions and integrations often ask for far more than they need. Review the permissions on anything connected to your email, files, or calendar and revoke what isn't essential." },
        { t: "Several, including shared passwords or API keys", r:3,
          fix:"You've shared credentials or keys with AI tools or connected them broadly. A leaked key or over-scoped integration can expose everything behind it. Rotate any shared secrets, use per-tool keys with the narrowest scope, and never paste a password into a prompt." }
      ]
    },
    {
      q: "Do you use AI to help with sensitive decisions (legal, financial, HR, medical)?",
      opts: [
        { t: "No, or only with a professional's review", r:0 },
        { t: "For background, then I confirm with an expert", r:1 },
        { t: "Sometimes I act on its guidance directly", r:2,
          fix:"You're acting on AI guidance in high-stakes areas without expert review. These tools sound authoritative and are regularly wrong on law, tax, and health. Use AI to prepare questions, then run the actual decision past a qualified human." },
        { t: "Often, it's faster than asking someone", r:3,
          fix:"You're routinely making sensitive decisions on AI advice alone. The cost of one confident wrong answer here dwarfs the time saved. Keep a hard rule that legal, financial, HR, and medical calls get a professional's sign-off before you act." }
      ]
    },
    {
      q: "What have you done with the data and history settings in your AI tools?",
      opts: [
        { t: "Turned off training and history where I can", r:0 },
        { t: "Reviewed them and set them deliberately", r:1 },
        { t: "Left them on the defaults", r:2,
          fix:"You're on default settings, which usually means your conversations can be retained and reviewed. Open the privacy settings, turn off model training on your data, and clear or disable history on anything work-related." },
        { t: "No idea what those settings are", r:3,
          fix:"You haven't looked at the data controls at all. That's the single easiest gap to close. Each major tool has a privacy or data-controls page where you can stop your inputs being used for training and limit what's stored." }
      ]
    },
    {
      q: "Does your team have any shared rules for using AI safely?",
      opts: [
        { t: "Yes, clear guidelines everyone follows", r:0 },
        { t: "Loose norms, mostly understood", r:1 },
        { t: "Nothing written down, everyone does their own thing", r:2,
          fix:"Your team has no shared rules, so safety depends on whoever is least careful. A one-page do and don't list prevents most incidents. Even an informal agreement on what never goes into a prompt is a real upgrade." },
        { t: "We don't talk about it at all", r:3,
          fix:"AI safety simply isn't on your team's radar, which means a mistake is a matter of when. Raising a short, practical policy makes you the person who got ahead of it rather than the one who explains the leak." }
      ]
    },
    {
      q: "If a sensitive prompt or output leaked tomorrow, how exposed would you be?",
      opts: [
        { t: "Barely, I keep sensitive material out of AI entirely", r:0 },
        { t: "A little, but nothing serious", r:1 },
        { t: "Genuinely uncomfortable, there's real stuff in there", r:2,
          fix:"You already sense there's sensitive material in your AI history, which is worth acting on now rather than after a leak. Clear old conversations, tighten what you paste going forward, and treat the chat box like an email that could be forwarded." },
        { t: "It would be a serious problem", r:3,
          fix:"You're carrying real, concentrated exposure in your AI usage. Treat this as urgent: purge sensitive history, move confidential work to a properly governed tool, and lock down the settings and integrations before the exposure becomes an incident." }
      ]
    }
  ],

  // Bands are chosen by normalized 0..100 score (higher = riskier).
  bands: [
    {
      max: 33,
      name: "The Careful Operator",
      tagline: "You get the upside of AI without leaving the door open behind you.",
      summary: "You already treat AI like a powerful tool that deserves a few guardrails, and it shows. You keep sensitive material out of public prompts, you check what matters, and you pay attention to settings most people never open. The goal now is to stay this deliberate as you use AI for bigger, higher-stakes work, because the exposure grows with the ambition.",
      accent: "var(--risk-lo)"
    },
    {
      max: 66,
      name: "The Exposed",
      tagline: "You're getting real value from AI, and quietly taking on real risk to get it.",
      summary: "You're in the most common spot there is: using AI enough to matter, without the habits that keep it safe. None of the gaps below are hard to close, and each one you fix removes a way this quietly goes wrong. Handle the top exposures listed here and you keep every bit of the speed while cutting most of the downside.",
      accent: "var(--risk-mid)"
    },
    {
      max: 100,
      name: "The Wild West",
      tagline: "You're moving fast with AI, and right now almost nothing is protecting you.",
      summary: "You're getting a lot done, and you're also one bad prompt or leaked history away from a genuine problem. The good news is that the biggest risks are also the easiest to fix, and you can close most of them in an afternoon. Start with the exposures listed below, in order, because the first few remove the failures that would hurt the most.",
      accent: "var(--risk-hi)"
    }
  ],

  // Free guides the result funnels into (self-hosted magnets on /free/).
  magnets: [
    { n:"What Not to Put Into AI", d:"The security and privacy guide that keeps you and your company out of trouble.", url:"https://elvinpeters.com/free/ai-security/" },
    { n:"The Anti-Hallucination Field Guide", d:"Make AI stop making things up, and know exactly when not to trust it.", url:"https://elvinpeters.com/free/anti-hallucination/" }
  ],

  angle: "Every fix above comes from one place: knowing how these tools actually handle your words. <b>The Artificial Advantage</b> is the plain-English playbook for using AI at full speed without the exposure, from what never belongs in a prompt to how to get answers you can trust. If it doesn't change how safely you work in 14 days, you get every cent back."
};

function startQuizEngine() {
  var stageEl = document.getElementById("stage");
  var barEl = document.getElementById("bar");
  var answers = [];
  var cur = 0;
  var N = QUIZ.questions.length;
  var lead = { email:"", name:"" };

  // Ad conversion ids for THIS quiz (lead capture). Create a Google Ads
  // "Submit lead form" conversion and an X "Lead" event for the AI Risk quiz,
  // then paste them here. Both dormant until then.
  var ADS = { x: "tw-re26u-re279", g: "AW-637214471/AKwFCNHut9UcEIe-7K8C" }; // shared "Quiz Lead" conversion; the source field segments which quiz produced the lead

  function setBar(p){ barEl.style.width = p + "%"; }
  function track(name, params){ try{ gtag('event', name, params||{}); }catch(e){} }
  function render(html){ stageEl.innerHTML = html; stageEl.firstElementChild && stageEl.firstElementChild.classList.add('fade'); }

  function showIntro(){
    cur = 0; setBar(0);
    var i = QUIZ.intro;
    render(
      '<div class="card intro">' +
        '<div class="eyebrow">'+i.eyebrow+'</div>' +
        '<h1>'+i.title+'</h1>' +
        i.body.map(function(p){return '<p>'+p+'</p>';}).join('') +
        '<div class="meta">'+i.meta+'</div>' +
        '<button class="btn full" id="startBtn">'+i.cta+'</button>' +
      '</div>'
    );
    document.getElementById("startBtn").onclick = function(){ track('quiz_start'); cur=0; showQuestion(); };
  }

  function showQuestion(){
    var Q = QUIZ.questions[cur];
    setBar(Math.round((cur)/(N+1)*100));
    var picked = answers[cur] ? answers[cur].optIndex : -1;
    var opts = Q.opts.map(function(o, idx){
      return '<button class="opt'+(idx===picked?' sel':'')+'" data-i="'+idx+'">' +
               '<span class="dot"></span><span>'+o.t+'</span>' +
             '</button>';
    }).join('');
    render(
      '<div class="card">' +
        '<div class="qnum">Question '+(cur+1)+' of '+N+'</div>' +
        '<div class="qtext">'+Q.q+'</div>' +
        '<div class="options">'+opts+'</div>' +
        '<div class="nav-row">' +
          '<button class="back" id="backBtn"'+(cur===0?' disabled':'')+'>← Back</button>' +
          '<button class="btn" id="nextBtn"'+(picked<0?' disabled':'')+'>'+(cur===N-1?'See my risk score →':'Next →')+'</button>' +
        '</div>' +
      '</div>'
    );
    Array.prototype.forEach.call(document.querySelectorAll(".opt"), function(b){
      b.onclick = function(){
        var idx = +b.getAttribute("data-i");
        answers[cur] = { optIndex: idx, text: Q.opts[idx].t };
        Array.prototype.forEach.call(document.querySelectorAll(".opt"), function(x){x.classList.remove("sel");});
        b.classList.add("sel");
        document.getElementById("nextBtn").disabled = false;
      };
    });
    document.getElementById("backBtn").onclick = function(){ if(cur>0){ cur--; showQuestion(); } };
    document.getElementById("nextBtn").onclick = function(){
      if(!answers[cur]) return;
      if(cur < N-1){ cur++; showQuestion(); } else { showGate(); }
    };
  }

  function showGate(){
    setBar(Math.round(N/(N+1)*100));
    render(
      '<div class="card gate">' +
        '<div class="eyebrow">Almost there</div>' +
        '<h1 style="font-size:30px;margin-bottom:10px;">Where should we send your risk score?</h1>' +
        '<p style="color:var(--muted);margin-bottom:22px;">Your score, your specific exposure list, and the fixes, plus one short email a week on using AI safely and well at work. No spam, unsubscribe any time.</p>' +
        '<div class="err" id="gateErr">Please enter a valid email.</div>' +
        '<label for="qname">First name (optional)</label>' +
        '<input id="qname" type="text" autocomplete="given-name" placeholder="Alex" />' +
        '<label for="qemail">Email</label>' +
        '<input id="qemail" type="email" autocomplete="email" placeholder="you@work.com" />' +
        '<button class="btn full" id="seeBtn">Show me my risk score →</button>' +
        '<div class="fineprint">We only use this to send your result and the newsletter.</div>' +
        '<div class="nav-row"><button class="back" id="backBtn2">← Back</button><span></span></div>' +
      '</div>'
    );
    document.getElementById("backBtn2").onclick = function(){ cur = N-1; showQuestion(); };
    document.getElementById("seeBtn").onclick = function(){
      var email = document.getElementById("qemail").value.trim();
      var name = document.getElementById("qname").value.trim();
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ document.getElementById("gateErr").style.display="block"; return; }
      lead.email = email; lead.name = name;
      track('quiz_lead', {});
      try{ fbq('track','Lead',{content_name:QUIZ.leadName+' Quiz'}); }catch(e){}
      submitLead();
      showResult();
    };
  }

  function scoreRisk(){
    var total = 0, maxTotal = 0;
    var fixes = [];
    answers.forEach(function(a, qi){
      var o = QUIZ.questions[qi].opts[a.optIndex];
      total += o.r;
      var mx = 0;
      QUIZ.questions[qi].opts.forEach(function(oo){ if(oo.r > mx) mx = oo.r; });
      maxTotal += mx;
      if(o.fix) fixes.push(o.fix);
    });
    var score = Math.round(total / maxTotal * 100);
    var band = QUIZ.bands[QUIZ.bands.length-1];
    for(var i=0;i<QUIZ.bands.length;i++){ if(score <= QUIZ.bands[i].max){ band = QUIZ.bands[i]; break; } }
    return { score: score, band: band, fixes: fixes };
  }

  function submitLead(){
    var res = scoreRisk();
    var summary = answers.map(function(a, qi){ return (qi+1)+". "+QUIZ.questions[qi].q+" -> "+a.text; }).join("  |  ");
    var payload = {
      name: lead.name || "Quiz lead",
      email: lead.email,
      message: "[AI RISK: "+res.band.name+" · score "+res.score+"/100 · "+res.fixes.length+" exposures]  "+summary,
      source: QUIZ.source + (location.search || "")
    };
    try {
      var body = new URLSearchParams(payload).toString();
      fetch(QUIZ.leadApi, {
        method: "POST", mode: "cors", keepalive: true,
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body
      }).catch(function(){});
    } catch(e){}
    // Ad conversions: quiz lead captured. Fire-and-forget, never blocks the funnel.
    try{ if(ADS.x && typeof twq==='function') twq('event', ADS.x, {}); }catch(e){}      // fires shared Quiz Lead conversion
    try{ if(ADS.g && typeof gtag==='function') gtag('event','conversion',{send_to:ADS.g}); }catch(e){}  // fires shared Quiz Lead conversion
  }

  function showResult(){
    setBar(100);
    var res = scoreRisk();
    var B = res.band;
    track('quiz_result', { band: B.name, risk: res.score });

    var fixesHtml;
    if(res.fixes.length){
      fixesHtml = '<div class="tools">' + res.fixes.map(function(f){
        return '<div class="tool"><span class="dot" style="margin-top:3px;border-color:var(--risk-hi);"></span><div><div class="td" style="color:var(--text);font-size:15px;line-height:1.6;">'+f+'</div></div></div>';
      }).join('') + '</div>';
    } else {
      fixesHtml = '<p>You didn\'t flag any high-risk habits, which is genuinely rare. Keep your sensitive work out of public tools, keep verifying what matters, and you stay in the safe lane as your AI use grows.</p>';
    }

    var magnets = QUIZ.magnets.map(function(m){
      return '<a class="magnet" href="'+m.url+'" target="_blank" rel="noopener" data-mn="'+m.n+'">' +
               '<div class="mg">Free guide</div><div class="mn">'+m.n+'</div><div class="md">'+m.d+'</div>' +
             '</a>';
    }).join('');

    render(
      '<div class="card result">' +
        '<div class="type-eyebrow">Your AI risk profile</div>' +
        '<h1>'+B.name+'</h1>' +
        '<div class="tagline">'+B.tagline+'</div>' +
        '<div class="gauge"><div class="label"><span>Your risk score</span><span class="scorebig" style="font-size:20px;">'+res.score+'/100</span></div><div class="track"><div class="fill" id="gfill"></div></div></div>' +
        '<div class="block"><h3>What this means</h3><p>'+B.summary+'</p></div>' +
        '<div class="block"><h3>Where you\'re exposed right now</h3>'+fixesHtml+'</div>' +
        '<div class="block"><h3>Close the gaps free</h3>'+magnets+'</div>' +
        '<div class="book-cta">' +
          '<div class="why">'+QUIZ.angle+'</div>' +
          '<a class="btn" href="'+QUIZ.bookUrl+'" target="_blank" rel="noopener" id="bookBtn">Get The Artificial Advantage — $37 →</a>' +
          '<div class="price">PDF · instant delivery · 14-day money-back guarantee · also on Amazon</div>' +
        '</div>' +
        '<div class="share"><a href="'+QUIZ.salesUrl+'" target="_blank" rel="noopener">Read more about the book →</a></div>' +
      '</div>'
    );
    setTimeout(function(){ var f=document.getElementById("gfill"); if(f) f.style.width = res.score + "%"; }, 120);
    Array.prototype.forEach.call(document.querySelectorAll(".magnet"), function(a){
      a.onclick = function(){ track('magnet_click', {event_label:a.getAttribute('data-mn')}); };
    });
    var bb = document.getElementById("bookBtn");
    if(bb) bb.onclick = function(){ track('gumroad_click', {event_label:'quiz_result'}); try{ fbq('track','InitiateCheckout',{content_name:'The Artificial Advantage',value:37.00,currency:'USD'});}catch(e){} };
  }

  showIntro();
}

document.addEventListener("DOMContentLoaded", startQuizEngine);
</script>
</body>
</html>
