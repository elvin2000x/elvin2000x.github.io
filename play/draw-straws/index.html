<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="stylesheet" href="../_kit/play-kit.css">
<title>Draw Straws</title>
<style>
  /* ============================================================ draw-straws
     All styling builds on --pk-* tokens only (no hard-coded brand color).
     Straws use the kraft material tokens. Light + dark + reduced-motion
     inherit from the kit; theatrical motion is gated in JS on PK.motion. */

  /* --- mode selector (wraps on narrow screens) --- */
  .ds-seg{ flex-wrap:wrap; justify-content:center; max-width:100%; gap:2px; }
  .ds-seg button{ white-space:nowrap; }

  /* --- K stepper / count stepper (shared look) --- */
  .ds-stepper{ display:inline-flex; align-items:center; gap:2px; padding:2px;
    background:var(--pk-surface); border:1.5px solid var(--pk-line); border-radius:var(--pk-radius-pill); }
  .ds-stepper button{ width:38px; height:38px; }
  .ds-stepper[aria-disabled="true"]{ opacity:.45; }
  .ds-stepper__val{ min-width:64px; text-align:center; font-size:var(--pk-fs-lg); font-weight:650;
    font-variant-numeric:tabular-nums; }
  .ds-stepper__val small{ display:block; font-size:10px; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase; color:var(--pk-ink-faint); }

  .ds-kwrap{ display:flex; align-items:center; gap:10px; }
  .ds-kwrap[hidden]{ display:none; }
  .ds-kwrap > span{ font-size:var(--pk-fs-sm); color:var(--pk-ink-soft); font-weight:600; }

  /* --- the fist (hero) --- */
  .ds-stage-wrap{ width:100%; display:flex; flex-direction:column; align-items:center; gap:var(--pk-gap); }
  .ds-fist{
    position:relative; width:100%; max-width:540px; height:272px;
    display:flex; justify-content:center; align-items:flex-end;
    gap:clamp(4px,1.6vw,12px); padding:0 12px; overflow:hidden;
  }
  .ds-fist.is-idle{ animation:ds-breathe 5.5s ease-in-out infinite; }
  @keyframes ds-breathe{ 0%,100%{ transform:rotate(-.5deg);} 50%{ transform:rotate(.5deg);} }

  /* one straw: bottom-anchored, kraft gradient, rounded cap; length hidden by band */
  .ds-straw{
    position:relative; flex:0 0 auto; align-self:flex-end;
    border-radius:9px 9px 4px 4px; will-change:transform, filter;
    background:
      repeating-linear-gradient(180deg,
        color-mix(in srgb, var(--pk-mat-kraft) 88%, white) 0 3px,
        var(--pk-mat-kraft) 3px 7px) ,
      linear-gradient(180deg, color-mix(in srgb, var(--pk-mat-kraft) 92%, white),
        var(--pk-mat-kraft) 42%, var(--pk-mat-kraft-dk) 100%);
    background-blend-mode:soft-light, normal;
    box-shadow:
      inset 0 2px 0 color-mix(in srgb, var(--pk-mat-kraft) 55%, white),
      inset -3px 0 5px rgba(40,28,10,.28),
      inset 3px 0 4px color-mix(in srgb, var(--pk-mat-kraft) 60%, white),
      2px 3px 6px rgba(40,28,10,.28);
    transform:translateY(0);
  }
  :root[data-theme="dark"] .ds-straw,
  :root:not([data-theme="light"]) .ds-straw{
    background:
      repeating-linear-gradient(180deg,
        color-mix(in srgb, var(--pk-mat-kraft-dk) 78%, white) 0 3px,
        var(--pk-mat-kraft-dk) 3px 7px),
      linear-gradient(180deg, color-mix(in srgb, var(--pk-mat-kraft) 80%, white),
        var(--pk-mat-kraft-dk) 46%, color-mix(in srgb, var(--pk-mat-kraft-dk) 70%, black) 100%);
    background-blend-mode:soft-light, normal;
  }
  /* rounded straw cap */
  .ds-straw::before{ content:""; position:absolute; top:-3px; left:0; right:0; height:8px;
    border-radius:9px 9px 0 0;
    background:linear-gradient(180deg, color-mix(in srgb, var(--pk-mat-kraft) 60%, white), var(--pk-mat-kraft));
    box-shadow:inset 0 2px 2px rgba(255,255,255,.4); }
  /* specular sweep that rides down the straw as it emerges */
  .ds-straw::after{ content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background:linear-gradient(180deg, transparent 0%, rgba(255,255,255,.55) 8%, transparent 22%);
    background-size:100% 300%; background-position:0 -60%; opacity:0; }
  .ds-straw.is-sliding::after{ opacity:1; animation:ds-spec .8s var(--pk-ease-settle) forwards; }
  @keyframes ds-spec{ from{ background-position:0 -60%; } to{ background-position:0 160%; } }

  .ds-straw.is-drawn{ z-index:4; filter:drop-shadow(0 10px 14px rgba(40,28,10,.45)); }
  .ds-straw.is-chosen-bad{ background:linear-gradient(180deg,
      color-mix(in srgb, var(--pk-bad) 42%, var(--pk-mat-kraft)),
      color-mix(in srgb, var(--pk-bad) 70%, var(--pk-mat-kraft-dk))); }
  .ds-straw.is-chosen-good{ background:linear-gradient(180deg,
      color-mix(in srgb, var(--pk-accent) 40%, var(--pk-mat-kraft)),
      color-mix(in srgb, var(--pk-accent) 66%, var(--pk-mat-kraft-dk))); }
  .ds-straw.is-flash{ animation:ds-shake .5s var(--pk-ease-spring); }
  @keyframes ds-shake{
    0%{ transform:translateY(0) scale(1.08); }
    20%{ transform:translateY(0) translateX(-4px) scale(1.06); }
    40%{ transform:translateY(0) translateX(4px) scale(1.05); }
    60%{ transform:translateY(0) translateX(-3px) scale(1.03); }
    80%{ transform:translateY(0) translateX(2px) scale(1.02); }
    100%{ transform:translateY(0) scale(1); }
  }
  .ds-straw.is-pullable{ cursor:pointer; }
  .ds-straw.is-pullable:hover{ filter:brightness(1.05); }
  .ds-straw.is-pullable:focus-visible{ outline:3px solid var(--pk-focus); outline-offset:3px; }
  .ds-straw.is-pulled{ z-index:3; }

  /* per-straw label (name or number) */
  .ds-label{ position:absolute; top:-22px; left:50%; transform:translateX(-50%);
    font-size:var(--pk-fs-xs); font-weight:700; letter-spacing:.01em; color:var(--pk-ink);
    background:var(--pk-surface); border:1px solid var(--pk-line); border-radius:var(--pk-radius-pill);
    padding:1px 7px; white-space:nowrap; opacity:0; transition:opacity var(--pk-t-quick) var(--pk-ease-standard);
    box-shadow:var(--pk-shadow-1); pointer-events:none; max-width:88px; overflow:hidden; text-overflow:ellipsis; }
  .ds-label.is-on{ opacity:1; }
  .ds-fist.is-crowded .ds-label{ display:none; }

  /* the band / fist that grips the straws (hides their varying bottoms) */
  .ds-band{ position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    width:min(100%, 560px); height:64px; z-index:5; border-radius:34px / 26px;
    background:linear-gradient(180deg,
      color-mix(in srgb, var(--pk-surface-sunk) 70%, var(--pk-mat-kraft-dk)) 0%,
      var(--pk-surface-sunk) 45%,
      color-mix(in srgb, var(--pk-surface-sunk) 80%, black) 100%);
    box-shadow:var(--pk-shadow-obj), inset 0 2px 3px rgba(255,255,255,.18); }
  .ds-band::after{ content:""; position:absolute; inset:6px 10px auto 10px; height:10px; border-radius:999px;
    background:linear-gradient(180deg, rgba(255,255,255,.16), transparent); }

  /* result readout + tagline */
  .ds-tagline{ color:var(--pk-ink-soft); font-size:var(--pk-fs-sm); min-height:1.2em; }
  .ds-hint{ color:var(--pk-ink-soft); font-size:var(--pk-fs-sm); min-height:1.1em; }

  /* names panel */
  .ds-panel{ width:100%; max-width:540px; display:flex; flex-direction:column; gap:10px; text-align:left; }
  .ds-panel summary{ cursor:pointer; font-weight:600; font-size:var(--pk-fs-sm); color:var(--pk-ink-soft);
    list-style:none; display:flex; align-items:center; gap:8px; padding:2px 0; }
  .ds-panel summary::-webkit-details-marker{ display:none; }
  .ds-panel summary::before{ content:"▸"; transition:transform var(--pk-t-quick); color:var(--pk-ink-faint); }
  .ds-panel[open] summary::before{ transform:rotate(90deg); }
  .ds-names{ width:100%; min-height:88px; resize:vertical; padding:10px 12px; line-height:1.5; }
  .ds-panel-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .ds-switch-lbl{ display:flex; align-items:center; gap:10px; font-size:var(--pk-fs-sm);
    font-weight:600; color:var(--pk-ink); }
  .ds-switch-lbl small{ display:block; font-weight:400; color:var(--pk-ink-faint); }

  /* confetti particles (win / pick modes only) */
  .ds-burst{ position:absolute; left:50%; top:38%; width:0; height:0; z-index:6; pointer-events:none; }
  .ds-particle{ position:absolute; width:9px; height:9px; border-radius:2px; will-change:transform,opacity; }

  @media (max-width:400px){
    .ds-fist{ height:250px; }
    .ds-stepper__val{ min-width:52px; }
  }
</style>
</head><body>

<script src="../_kit/play-kit.js"></script>

<script>
var HEADLESS = (typeof document === "undefined");

/* =====================================================================
   PURE LOGIC — no DOM, injectable rng. Exported as globalThis.DRAWSTRAWS.
   rng(n) -> uniform int in [0, n). The commit (Fisher-Yates over rng)
   decides the entire outcome BEFORE anything animates; lengths are a
   deterministic, cosmetic re-derivation of that commit.
   ===================================================================== */

var MODES = ["short-loses", "long-wins", "pick-k", "picker"];
var MIN_STRAWS = 2, MAX_STRAWS = 20;

function clampCount(n){                       // floor, clamp to [2,20]; non-numbers -> 2
  n = Math.floor(Number(n));
  if (!isFinite(n)) return MIN_STRAWS;
  if (n < MIN_STRAWS) return MIN_STRAWS;
  if (n > MAX_STRAWS) return MAX_STRAWS;
  return n;
}

function clampK(k, n){                         // floor, clamp to [1, n-1]; non-numbers -> 1
  k = Math.floor(Number(k));
  if (!isFinite(k)) return 1;
  if (k < 1) return 1;
  if (k > n - 1) return n - 1;
  return k;
}

function parseNames(str){                      // split on newline AND comma, trim, drop empties
  if (str == null) return [];
  return String(str).split(/[\n,]/).map(function(s){ return s.trim(); })
    .filter(function(s){ return s.length > 0; });
}

// Fisher-Yates over the injected rng (returns a new array; does not mutate input).
function fisherYates(arr, rng){
  var a = arr.slice(), i, j, t;
  for (i = a.length - 1; i > 0; i--){ j = rng(i + 1); t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

// The whole outcome, decided up front. Lengths are distinct integer ranks (higher = longer).
function draw(n, mode, k, rng){
  n = clampCount(n);
  if (MODES.indexOf(mode) < 0) mode = "short-loses";
  var base = [], i, j;
  for (i = 0; i < n; i++) base.push(i);
  var order = fisherYates(base, rng);          // THE COMMIT
  var lengths = new Array(n), chosen, short = null, kk = 0;

  if (mode === "short-loses"){
    chosen = [order[0]]; short = order[0];
    for (j = 0; j < n; j++) lengths[order[j]] = j;             // order[0] -> rank 0 (strict min)
  } else if (mode === "long-wins" || mode === "picker"){
    chosen = [order[0]]; short = null;
    lengths[order[0]] = n - 1;                                  // winner -> rank n-1 (strict max)
    for (j = 1; j < n; j++) lengths[order[j]] = j - 1;         // rest -> 0..n-2 in order sequence
  } else {                                                      // pick-k
    kk = clampK(k, n);
    chosen = order.slice(0, kk); short = null;
    for (j = 0; j < n; j++){
      if (j < kk) lengths[order[j]] = n - kk + j;              // K winners -> top K ranks
      else lengths[order[j]] = j - kk;                          // non-winners -> 0..n-k-1
    }
  }
  return { n: n, mode: mode, k: kk, order: order, chosen: chosen, lengths: lengths, short: short };
}

// Pure array lookup — NO rng, mutates nothing. Revealing in any order returns identical values.
function reveal(result, i){
  return { index: i, length: result.lengths[i], chosen: result.chosen.indexOf(i) >= 0 };
}

// names[i] for each chosen index, in chosen order.
function chosenNames(result, names){
  return result.chosen.map(function(i){ return names[i]; });
}

/* =====================================================================
   BROWSER WIRING — everything below touches the DOM / PK, so it is fully
   guarded behind !HEADLESS and is never reached by node bot_test.js.
   ===================================================================== */
if (!HEADLESS) {

  var STORE = {
    mode: "play.draw-straws.mode", count: "play.draw-straws.count", k: "play.draw-straws.k",
    names: "play.draw-straws.names", pick: "play.draw-straws.pickReveal"
  };
  var TAGLINE = "Short straw loses. Decided fair, before a single straw moves.";

  // straw geometry (px). tops sit flush at FLUSH; the band hides everything below.
  var FLUSH = 100, MINH = 120, MAXH = 232, IDLE_H = FLUSH + 46;

  /* ---- persisted state ---- */
  var mode = MODES.indexOf(PK.store.get(STORE.mode, "short-loses")) >= 0
    ? PK.store.get(STORE.mode, "short-loses") : "short-loses";
  var count = clampCount(PK.store.get(STORE.count, 5));
  var kVal = Math.floor(Number(PK.store.get(STORE.k, 2))) || 2;
  var names = PK.store.get(STORE.names, []);
  if (!Array.isArray(names)) names = [];
  var pickReveal = !!PK.store.get(STORE.pick, false);

  var drawing = false, currentResult = null, pulled = null;

  var ui, fistEl, bandEl, resultEl, taglineEl, hintEl, strawEls = [],
      modeSeg, kWrap, kValEl, namesEl, pickSw,
      countStepper, countValEl, namesResetBtn;

  /* ---- name / straw resolution ---- */
  function effectiveNames(){
    var list = parseNames(namesEl ? namesEl.value : names.join("\n"));
    return list;
  }
  function usingNames(){ return effectiveNames().length >= 2; }
  function activeCount(){
    var list = effectiveNames();
    if (list.length >= 2) return clampCount(list.length);
    return clampCount(count);
  }
  function labelFor(i){
    var list = effectiveNames();
    if (usingNames() && i < list.length) return list[i];
    return "Straw " + (i + 1);
  }

  /* ---- straw sizing ---- */
  function strawHeight(rank, n){
    if (n <= 1) return MAXH;
    return Math.round(MINH + (MAXH - MINH) * (rank / (n - 1)));   // distinct, monotone
  }
  function strawWidth(n){
    return Math.max(8, Math.min(28, Math.floor(480 / n) - 6));
  }
  function setGeom(el, h){
    el.style.height = h + "px";
    var rest = h - FLUSH;                                          // >0 => pushed down into the fist
    el.dataset.rest = String(rest);
    el.style.transform = "translateY(" + rest + "px)";
  }

  /* ---- build the resting fist (uniform tops; lengths hidden) ---- */
  function renderFist(){
    var n = activeCount();
    var w = strawWidth(n);
    fistEl.classList.toggle("is-crowded", n > 10);
    fistEl.innerHTML = "";
    strawEls = [];
    for (var i = 0; i < n; i++){
      var el = document.createElement("div");
      el.className = "ds-straw";
      el.style.width = w + "px";
      // tiny hand-held jitter (never affects length ordering)
      var rot = ((i * 37) % 5 - 2) * 0.8;                         // deterministic ~±1.6deg
      el.style.setProperty("--rot", rot + "deg");
      setGeom(el, IDLE_H);
      var lab = document.createElement("span");
      lab.className = "ds-label";
      el.appendChild(lab);
      fistEl.appendChild(el);
      strawEls.push(el);
    }
    fistEl.appendChild(bandEl);
    fistEl.classList.toggle("is-idle", !PK.motion.reduced && !drawing);
  }

  function resetToReady(retagline){
    drawing = false; currentResult = null; pulled = null;
    renderFist();
    resultEl.textContent = ""; resultEl.removeAttribute("data-tone");
    if (retagline){ taglineEl.textContent = TAGLINE; taglineEl.hidden = false; }
    hintEl.textContent = "";
    if (ui && ui.primary){ ui.primary.textContent = "Draw"; ui.primary.disabled = false; }
  }

  /* ---- one straw slides up out of the fist to its true length ---- */
  function slideStraw(el, opts){
    var rest = parseFloat(el.dataset.rest) || 0;
    var rot = el.style.getPropertyValue("--rot") || "0deg";
    if (PK.motion.reduced){
      el.style.transition = "transform 120ms " + "cubic-bezier(.16,1,.3,1)";
      el.style.transform = "translateY(0) rotate(" + rot + ")";
      return;
    }
    el.classList.add("is-sliding");
    el.animate([
      { transform: "translateY(" + rest + "px) rotate(" + rot + ")" },
      { transform: "translateY(-6px) rotate(" + rot + ")", offset: 0.72, easing: "cubic-bezier(.34,1.56,.64,1)" },
      { transform: "translateY(0) rotate(" + rot + ")" }
    ], { duration: 820, easing: "cubic-bezier(.16,1,.3,1)", fill: "forwards" });
    el.style.transform = "translateY(0) rotate(" + rot + ")";
    setTimeout(function(){ el.classList.remove("is-sliding"); }, 840);
  }

  function showLabel(i){
    var lab = strawEls[i] && strawEls[i].querySelector(".ds-label");
    if (lab){ lab.textContent = labelFor(i); lab.classList.add("is-on"); }
  }

  /* ---- verdict text per mode ---- */
  function formatList(items){
    if (items.length === 1) return items[0];
    if (items.length === 2) return items[0] + " & " + items[1];
    return items.slice(0, -1).join(", ") + " & " + items[items.length - 1];
  }
  function verdictText(result){
    var withNames = usingNames();
    var chosenLabels = result.chosen.map(function(i){ return labelFor(i); });
    if (result.mode === "short-loses"){
      var c = result.chosen[0];
      return { text: withNames ? (labelFor(c) + " drew the short straw.") : ("Straw " + (c + 1) + " is short."),
        tone: "bad" };
    }
    if (result.mode === "long-wins"){
      var w = result.chosen[0];
      return { text: withNames ? (labelFor(w) + " wins!") : ("Straw " + (w + 1) + " wins."), tone: "good" };
    }
    if (result.mode === "picker"){
      var p = result.chosen[0];
      return { text: withNames ? ("The chosen one: " + labelFor(p) + ".") : ("Straw " + (p + 1) + " is chosen."),
        tone: "good" };
    }
    // pick-k
    if (withNames) return { text: formatList(chosenLabels) + " win.", tone: "good" };
    var nums = result.chosen.map(function(i){ return (i + 1); });
    return { text: "Straws " + formatList(nums.map(String)) + " win.", tone: "good" };
  }

  /* ---- confetti (win / pick modes, full motion only) ---- */
  function burst(){
    if (PK.motion.reduced) return;
    var b = document.createElement("div"); b.className = "ds-burst";
    fistEl.appendChild(b);
    var cols = ["var(--pk-accent)", "var(--pk-good)", "var(--pk-mat-gold)", "var(--pk-warn)"];
    for (var i = 0; i < 14; i++){
      var p = document.createElement("div"); p.className = "ds-particle";
      p.style.background = cols[i % cols.length];
      b.appendChild(p);
      var ang = (Math.PI * 2 * i) / 14 + (PK.rand.float() - 0.5);
      var dist = 60 + PK.rand.int(70);
      var dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist - 30;
      p.animate([
        { transform: "translate(0,0) scale(1)", opacity: 1 },
        { transform: "translate(" + dx + "px," + dy + "px) rotate(" + (PK.rand.int(360)) + "deg) scale(.4)", opacity: 0 }
      ], { duration: 900 + PK.rand.int(300), easing: "cubic-bezier(.16,1,.3,1)", fill: "forwards" });
    }
    setTimeout(function(){ if (b.parentNode) b.parentNode.removeChild(b); }, 1300);
  }

  /* ---- fire the verdict (shared by animated + pick-to-reveal paths) ---- */
  function finishVerdict(result){
    var v = verdictText(result);
    var chosenClass = v.tone === "bad" ? "is-chosen-bad" : "is-chosen-good";
    result.chosen.forEach(function(ci){
      var el = strawEls[ci];
      if (!el) return;
      el.classList.add("is-drawn", chosenClass);
      if (!PK.motion.reduced) el.classList.add("is-flash");
      showLabel(ci);
    });
    resultEl.textContent = v.text;
    resultEl.setAttribute("data-tone", v.tone);
    taglineEl.hidden = true;
    hintEl.textContent = "";
    PK.announce(v.text, true);
    PK.buzz(30);
    if (v.tone === "bad") PK.sound.play("lose"); else PK.sound.play("win");
    if (v.tone === "good") burst();
    drawing = false;
    ui.primary.disabled = false;
    ui.primary.textContent = "Draw Again";
  }

  /* ---- animated reveal (all straws slide, staggered) ---- */
  function animateReveal(result){
    var n = result.n, reduced = PK.motion.reduced;
    // assign true heights while keeping tops flush (no visual jump), show numbers hidden
    for (var i = 0; i < n; i++) setGeom(strawEls[i], strawHeight(result.lengths[i], n));

    if (reduced){
      for (var j = 0; j < n; j++) slideStraw(strawEls[j], {});
      setTimeout(function(){ finishVerdict(result); }, 150);
      return;
    }

    fistEl.classList.remove("is-idle");
    // anticipation: fist wiggle + scale
    bandEl.animate([
      { transform: "translateX(-50%) rotate(0deg) scale(1)" },
      { transform: "translateX(-50%) rotate(3deg) scale(1.02)", offset: 0.5 },
      { transform: "translateX(-50%) rotate(-2deg) scale(1.01)", offset: 0.8 },
      { transform: "translateX(-50%) rotate(0deg) scale(1)" }
    ], { duration: 250, easing: "cubic-bezier(.7,-0.4,.4,1)", fill: "forwards" });

    var stagger = n <= 8 ? 60 : n <= 14 ? 42 : 26;
    var slideDur = 840;
    (function scheduleStraws(){
      for (var s = 0; s < n; s++){
        (function(idx){
          setTimeout(function(){
            slideStraw(strawEls[idx], {});
            PK.sound.play("strawReveal");
          }, 250 + idx * stagger);
        })(s);
      }
    })();

    var total = 250 + (n - 1) * stagger + slideDur;
    setTimeout(function(){ finishVerdict(result); }, total);
  }

  /* ---- pick-to-reveal: straws stay hidden; each tap pulls one ---- */
  function enterPickMode(result){
    pulled = {};
    var chosenSet = {};
    result.chosen.forEach(function(c){ chosenSet[c] = true; });
    // assign geometry now (tops still flush, hidden) so a pull reveals the pre-decided length
    for (var i = 0; i < result.n; i++) setGeom(strawEls[i], strawHeight(result.lengths[i], result.n));

    strawEls.forEach(function(el, idx){
      el.classList.add("is-pullable");
      el.setAttribute("role", "button");
      el.setAttribute("tabindex", "0");
      el.setAttribute("aria-label", "Pull straw " + (idx + 1));
      var pull = function(){ pullStraw(result, idx); };
      el.addEventListener("click", pull);
      el.addEventListener("keydown", function(e){
        if (e.key === "Enter" || e.key === " " || e.code === "Space"){ e.preventDefault(); pull(); }
      });
    });
    hintEl.textContent = "Tap a straw to pull it — the outcome is already set.";
    resultEl.textContent = "";
    ui.primary.textContent = "Draw Again";
    ui.primary.disabled = false;   // allow re-roll; drawing stays true so Space won't double-fire? keep enabled
    drawing = false;
  }
  function pullStraw(result, i){
    if (!pulled || pulled[i]) return;
    pulled[i] = true;
    var info = reveal(result, i);                 // pure lookup — tap order changes nothing
    var el = strawEls[i];
    el.classList.remove("is-pullable"); el.classList.add("is-pulled");
    el.removeAttribute("tabindex");
    slideStraw(el, {});
    PK.sound.play("strawReveal");
    showLabel(i);

    var allPulled = true, allChosenPulled = true, c;
    for (c = 0; c < result.n; c++) if (!pulled[c]) { allPulled = false; break; }
    result.chosen.forEach(function(ci){ if (!pulled[ci]) allChosenPulled = false; });

    if (allChosenPulled || allPulled){
      strawEls.forEach(function(s){ s.classList.remove("is-pullable"); s.removeAttribute("tabindex"); });
      finishVerdict(result);
    }
  }

  /* ---- main action ---- */
  function doDraw(){
    if (drawing) return;

    // names edge cases
    var list = effectiveNames();
    if (list.length > MAX_STRAWS){ PK.toast("Only the first " + MAX_STRAWS + " names are used."); }
    if (namesEl && parseNames(namesEl.value).length === 1){ PK.toast("Add at least 2 names."); }

    var n = activeCount();
    var k = clampK(kVal, n);

    drawing = true;
    ui.primary.disabled = true;

    // DECIDE THE WHOLE OUTCOME FIRST (commit-then-reveal) — crypto RNG, never Math.random.
    currentResult = draw(n, mode, k, PK.rand.int);

    renderFist();
    resultEl.textContent = ""; resultEl.removeAttribute("data-tone");
    taglineEl.hidden = true;

    if (pickReveal){
      enterPickMode(currentResult);
    } else {
      animateReveal(currentResult);
    }
  }

  /* ---- mode selector ---- */
  function paintMode(){
    modeSeg.querySelectorAll("button").forEach(function(b){
      b.setAttribute("aria-pressed", String(b.dataset.m === mode));
    });
    kWrap.hidden = (mode !== "pick-k");
  }
  function setMode(m){
    mode = m; PK.store.set(STORE.mode, m);
    paintMode();
    resetToReady(true);
    PK.sound.play("click");
  }

  /* ---- K stepper ---- */
  function paintK(){
    var n = activeCount();
    kVal = clampK(kVal, n);
    PK.store.set(STORE.k, kVal);
    if (kValEl) kValEl.firstChild.nodeValue = String(kVal);
  }
  function setK(v){
    kVal = clampK(v, activeCount());
    PK.store.set(STORE.k, kVal);
    paintK();
    resetToReady(true);
    PK.sound.play("tick");
  }

  /* ---- count stepper ---- */
  function paintCount(){
    var locked = usingNames();
    countStepper.setAttribute("aria-disabled", String(locked));
    countStepper.querySelectorAll("button").forEach(function(b){ b.disabled = locked; });
    if (countValEl) countValEl.firstChild.nodeValue = String(activeCount());
  }
  function setCount(v){
    if (usingNames()) return;
    count = clampCount(v);
    PK.store.set(STORE.count, count);
    paintCount(); paintK();
    resetToReady(true);
  }

  /* ---- names ---- */
  var namesTimer = null;
  function onNamesInput(){
    clearTimeout(namesTimer);
    namesTimer = setTimeout(function(){
      names = parseNames(namesEl.value);
      PK.store.set(STORE.names, names);
      paintCount(); paintK();
      resetToReady(true);
    }, 300);
  }
  function resetNames(){
    namesEl.value = ""; names = []; PK.store.set(STORE.names, []);
    paintCount(); paintK();
    resetToReady(true);
    PK.sound.play("click");
  }

  /* ---- boot ---- */
  function boot(){
    ui = PK.app({ title: "Draw Straws", slug: "draw-straws", accent: "amber",
      action: { label: "Draw", onFire: doDraw, key: " " } });

    ui.stage.innerHTML =
      '<div class="pk-seg ds-seg" id="ds-mode" role="group" aria-label="Mode">' +
        '<button data-m="short-loses">Short loses</button>' +
        '<button data-m="long-wins">Long wins</button>' +
        '<button data-m="pick-k">Pick K</button>' +
        '<button data-m="picker">Picker</button>' +
      '</div>' +
      '<div class="ds-kwrap" id="ds-kwrap" hidden><span>Winners</span>' +
        '<div class="ds-stepper" id="ds-kstep" role="group" aria-label="Number of winners">' +
          '<button class="pk-icon-btn" id="ds-kminus" type="button" aria-label="Fewer winners">−</button>' +
          '<div class="ds-stepper__val" id="ds-kval" aria-live="polite">2<small>K</small></div>' +
          '<button class="pk-icon-btn" id="ds-kplus" type="button" aria-label="More winners">＋</button>' +
        '</div>' +
      '</div>' +
      '<div class="ds-stage-wrap">' +
        '<div class="ds-fist" id="ds-fist" aria-hidden="true"></div>' +
        '<div class="pk-result" id="ds-result" aria-hidden="true"></div>' +
        '<p class="ds-tagline" id="ds-tagline">' + TAGLINE + '</p>' +
        '<p class="ds-hint" id="ds-hint" aria-hidden="true"></p>' +
      '</div>' +
      '<details class="pk-panel ds-panel" id="ds-panel">' +
        '<summary>Names &amp; options</summary>' +
        '<textarea class="pk-input ds-names" id="ds-names" placeholder="One name per line, or comma-separated&#10;e.g. Ann, Bo, Cy, Dana" autocomplete="off" spellcheck="false"></textarea>' +
        '<div class="ds-panel-row">' +
          '<label class="ds-switch-lbl" for="ds-pick">' +
            '<span class="pk-switch"><input type="checkbox" id="ds-pick"><span></span></span>' +
            '<span>Pick-to-reveal<small>Players tap straws to pull them</small></span>' +
          '</label>' +
          '<button class="pk-btn pk-btn--ghost pk-btn--sm" id="ds-reset-names" type="button">Reset names</button>' +
        '</div>' +
      '</details>';

    fistEl     = document.getElementById("ds-fist");
    resultEl   = document.getElementById("ds-result");
    taglineEl  = document.getElementById("ds-tagline");
    hintEl     = document.getElementById("ds-hint");
    modeSeg    = document.getElementById("ds-mode");
    kWrap      = document.getElementById("ds-kwrap");
    kValEl     = document.getElementById("ds-kval");
    namesEl    = document.getElementById("ds-names");
    pickSw     = document.getElementById("ds-pick");
    namesResetBtn = document.getElementById("ds-reset-names");

    // the band lives inside the fist, appended after straws each render
    bandEl = document.createElement("div"); bandEl.className = "ds-band";

    // hydrate persisted names + pick toggle
    if (names.length) namesEl.value = names.join("\n");
    pickSw.checked = pickReveal;

    // wire mode seg
    modeSeg.addEventListener("click", function(e){
      var b = e.target.closest("button"); if (!b) return; setMode(b.dataset.m);
    });

    // K stepper
    document.getElementById("ds-kminus").addEventListener("click", function(){ setK(kVal - 1); });
    document.getElementById("ds-kplus").addEventListener("click", function(){ setK(kVal + 1); });

    // count stepper -> action bar (left of Draw)
    countStepper = document.createElement("div");
    countStepper.className = "ds-stepper"; countStepper.setAttribute("role", "group");
    countStepper.setAttribute("aria-label", "Number of straws");
    var minus = PK.el("button", { "class": "pk-icon-btn", type: "button", "aria-label": "Fewer straws",
      onClick: function(){ setCount(activeCount() - 1); PK.sound.play("tick"); } }, []);
    minus.innerHTML = "−";
    var plus = PK.el("button", { "class": "pk-icon-btn", type: "button", "aria-label": "More straws",
      onClick: function(){ setCount(activeCount() + 1); PK.sound.play("tick"); } }, []);
    plus.innerHTML = "＋";
    countValEl = document.createElement("div");
    countValEl.className = "ds-stepper__val";
    countValEl.appendChild(document.createTextNode(String(activeCount())));
    var cap = document.createElement("small"); cap.textContent = "straws"; countValEl.appendChild(cap);
    countValEl.setAttribute("aria-live", "polite");
    countStepper.appendChild(minus); countStepper.appendChild(countValEl); countStepper.appendChild(plus);
    ui.actions.insertBefore(countStepper, ui.primary);

    // names + options
    namesEl.addEventListener("input", onNamesInput);
    namesResetBtn.addEventListener("click", resetNames);
    pickSw.addEventListener("change", function(){
      pickReveal = pickSw.checked; PK.store.set(STORE.pick, pickReveal);
      resetToReady(true); PK.sound.play("click");
    });

    paintMode(); paintK(); paintCount();
    renderFist();
    taglineEl.textContent = TAGLINE;
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
}

/* =====================================================================
   Export the pure, testable surface for node bot_test.js (no DOM in Node).
   ===================================================================== */
if (HEADLESS && typeof globalThis !== "undefined") {
  globalThis.DRAWSTRAWS = {
    MODES: MODES, MIN_STRAWS: MIN_STRAWS, MAX_STRAWS: MAX_STRAWS,
    clampCount: clampCount, clampK: clampK, parseNames: parseNames,
    draw: draw, reveal: reveal, chosenNames: chosenNames
  };
}
</script>
</body></html>
